name: Update Age

on:
  schedule:
    - cron: "0 3 24 4 *"  # 24/04 às 00h00 (Brasília) = 03h00 UTC
  workflow_dispatch:

jobs:
  update-age:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Increment age
        run: sed -i -E 's/(<!--AGE-->)([0-9]+)(<!--\/AGE-->)/echo "\1$((\2+1))\3"/e' README.md
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "AUTO: Atualização da Idade" || exit 0
          git push